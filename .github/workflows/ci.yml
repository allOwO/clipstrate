name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          xcodegen --version

      - name: Generate project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild \
            -project Clipstrate.xcodeproj \
            -scheme Clipstrate \
            -configuration Debug \
            -destination 'generic/platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            build
