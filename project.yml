name: Clipstrate

options:
  bundleIdPrefix: io.github.allowo
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: 7.0.0
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.0.0

targets:
  Clipstrate:
    type: application
    platform: macOS
    sources:
      - path: Clipstrate
    dependencies:
      - package: GRDB
      - package: KeyboardShortcuts
    # 签名走可选包含的 xcconfig：本地存在 Signing.local.xcconfig 时用稳定证书
    # （TCC 授权跨重编保留）；不存在则回退 Xcode 默认 ad-hoc，其他机器/CI 不受影响。
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.allowo.clipstrate
        PRODUCT_NAME: Clipstrate
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        ARCHS: arm64
        MARKETING_VERSION: "0.3.0"
        CURRENT_PROJECT_VERSION: "3"
      configs:
        # 发布公证要求 hardened runtime；仅 Release 开启。Debug 关闭，否则库校验会
        # 拒绝 XCTest bundle 注入(ad-hoc 签名下测试宿主 SIGABRT)。AX/CGEvent 属 TCC 授权,不受影响。
        Debug:
          ENABLE_HARDENED_RUNTIME: NO
        Release:
          ENABLE_HARDENED_RUNTIME: YES
    info:
      path: Clipstrate/Info.plist
      properties:
        # 无 Dock 图标的菜单栏常驻 App
        LSUIElement: true
        LSMinimumSystemVersion: "26.0"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSHumanReadableCopyright: "© 2026"

  ClipstrateTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ClipstrateTests
    dependencies:
      - target: Clipstrate
    settings:
      base:
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        # 测试 bundle 无需自定义 plist，交由 Xcode 自动合成（否则代码签名报缺 Info.plist）
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Clipstrate:
    build:
      targets:
        Clipstrate: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ClipstrateTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
